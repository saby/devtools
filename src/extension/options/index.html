<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <meta charset="utf8" />
      <style>
         .Settings {
            display: flex;
            flex-direction: column;
         }
         .Settings__row {
            margin: 6px;
         }
      </style>
   </head>
   <body>
      <div class="Settings">
         <div class="Settings__row">
            <label for="useUserTimingAPI"
               >Использовать
               <a
                  href="https://developer.mozilla.org/en-US/docs/Web/API/User_Timing_API/Using_the_User_Timing_API"
                  >User Timing API</a
               ></label
            >
            <input
               id="useUserTimingAPI"
               name="useUserTimingAPI"
               type="checkbox"
            />
         </div>
         <div class="Settings__row">
            <label for="saveReactivePropsStacks"
            >Сохранять стек для изменившихся реактивных свойств</label>
            <input
                    id="saveReactivePropsStacks"
                    name="saveReactivePropsStacks"
                    type="checkbox"
            />
         </div>
         <div class="Settings__row">
            <label for="themeChooser">Theme:</label>
            <select name="themeChooser" id="themeChooser">
               <option value="devtools">Match devtools theme</option>
               <option value="light">Light</option>
               <option value="dark">Dark</option>
            </select>
         </div>
      </div>
      <script src="./index.js"></script>
   </body>
</html>
